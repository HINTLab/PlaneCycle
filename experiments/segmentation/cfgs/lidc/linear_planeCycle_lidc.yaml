seed: 42
dataset: 'lidc'
datasets:
  train:
    data_path: ...  # TODO
    upsampling_size: 160
    crop_size: 160
    move: 0
    train: True
    original_mask: False
  val:
    data_path: ...  # TODO
    upsampling_size: 160
    crop_size: 160
    move: 0
    train: False
    original_mask: False
data_loader:
  batch_size: 12
  num_workers: 4
backbone_model:
  load_model:
    repo_or_dir: "*/PlaneCycle/models"    # TODO: hubconf root dir
    model: 'dinov3_vits16'
    source: 'local'
    pretrained: False
    block_type: "PlaneCycle"  # Select from 'PlaneCycle', 'Slice2D' or 'Flatten3D'
  checkpoint_path: "*/dinov3_vits16_pretrain_lvd1689m-08c60483.pth"   # TODO
converter:
  cycle_order: ['HW', 'DW', 'DH', 'HW']
  pool_method: 'PCg'
segmentation_decoder:
  backbone_out_layers: 'last'
  hidden_dim: 512
  num_classes: 1
  dropout: 0
  tuning: False
optimizer:
  lr: 1e-4
  betas: [0.9, 0.999]
  weight_decay: 1e-3
scheduler:
  scheduler_type: 'WarmupOneCycleLR'
  total_iter: 20000
  constructor_kwargs:
    warmup_iters: 1000
    warmup_ratio: 1e-6
    anneal_strategy: 'cos'
    base_momentum: 0.85
    max_momentum: 0.95
    div_factor: 10.0
    final_div_factor: .inf
    use_beta1: False
    update_momentum: False
    last_epoch: -1
loss_function:
  dice_weight: 1
  ce_weight: 1
  boundary_weight: 0
  n_class: 1
  pos_weight: 1
  include_background_dice: True
  include_background_ce: False
gradient_clip: .inf
eval_interval: 250
metric_to_save: 'dice'
model_dir_to_save: ...  # TODO
wandb_name: ...         # TODO
